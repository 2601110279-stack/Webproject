<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>원의 둘레와 넓이</title>
    <script>
        const PI = Math.PI;

        function circlecalc(r){
        // 원의 둘레
        let circum = 2 * PI * r;
        alert("반지름이 " + r + "cm인 원의 둘레: " + circum + "cm");
        // 원의 넓이
        let area = PI * Math.pow(r, 2);
        alert("반지름이 " + r + "cm인 원의 넓이: " + area + "㎠");
        }

        circlecalc(7);
        circlecalc(10);
        circlecalc(20);
    </script>
</head>
<body>
    
</body>
</html>
