<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .div1{
            width: 300px;
            height: 300px;
            background-color: rgb(60, 192, 34);
            color: white;
            border: 10px double rgb(27, 18, 18);
            margin: 50px 50px 0 50px;
            padding: 0 50px 0 50px;
            /*margin-right: 50px;
            margin-left: 50px;
            padding-right: 50px;
            padding-left: 50px;*/
            text-align: center;
            line-height: 300px;
        }
        .div2{
            width: 400px;
            height: 400px;
            background-color: rgb(160, 43, 175);
            color: white;
            border: 20px ridge rgb(27, 18, 18);
            margin: 50px 50px 0 50px;
            padding: 0 50px 0 50px;
            text-align: center;
            line-height: 400px;
        }
        .div3{
            width: 500px;
            height: 500px;
            background-color: rgb(60, 192, 34);
            color: white;
            border-width: 30px;
            border-style: outset;
            border-color: rgb(48, 168, 189);
            margin: 50px 50px 0 50px;
            padding: 0 50px 0 50px;
            text-align: center;
            line-height: 500px;
        }
    </style>
</head>
<body>
    <div class="div1">박스 속성과 값을 설정 방법</div>
    <div class="div2">박스 속성과 값을 설정 방법</div>
    <div class="div3">박스 속성과 값을 설정 방법</div>
</body>
</html>
