<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    table {
        border-collapse: collapse;
    }
    th, td {
        padding: 10px;
        text-align: center;
        border: 3px outset black;
    }
    </style>
</head>
<body>
    <form action="01.html" method="post">
        <fieldset>
            <legend>개인 정보 입력</legend>
            <table border="1">
         <tr>
            <td><label for="name"> 성명 : </label><input type="text" id="name" name="name"><br><br></td>
        </tr>
        <tr>
            <td><label for="email"> 이메일 : </label><input type="email" id="email" name="email"><br><br></td>
        </tr>
        <tr>
            <td><label for="address"> 주소 : </label><input type="text" id="address" name="address"><br><br></td>
        </tr>
        <tr>
            <td> 성별 : <input type="radio" name="gender" value="남성">남성 &nbsp;&nbsp;
                   <input type="radio" name="gender" value="여성">여성<br><br></td>
        </tr>
        <tr>
            <td> 취미 : <input type="checkbox" name="hobby" value="운동">운동 &nbsp;&nbsp;
               <input type="checkbox" name="hobby" value="독서">독서 &nbsp;&nbsp;
               <input type="checkbox" name="hobby" value="음악감상">음악감상<br><br>
        <input type="submit" value="가입하기"> &nbsp;&nbsp;
        <input type="reset" value="입력초기화">
        </table>
        </fieldset> 
    </form>
</body>
</html>
