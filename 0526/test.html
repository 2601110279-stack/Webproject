<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        let changeMode = function(){
            document.body.style.backgroundColor = "black";
            document.body.style.color = "white";
            document.getElementById("firstH1").style.color = "lightgray";
            document.getElementById("firstH1").style.backgroundColor = "rgb(0, 255, 255)";
            document.getElementById("button").style.backgroundColor = "darkgray";
            document.getElementById("button").style.color = "lightgray";
            alert("다크모드가 켜졌습니다!");
        }

        window.onload = function(){
            firstH1 = document.getElementById("firstH1");
            firstH1.style.color = "orange";
            firstH1.style.backgroundColor = "red";
            firstH1.innerHTML = "첫 번째 제목입니다.";
        }
    </script>
</head>
<body>
    <button onclick="changeMode()">다크모드</button>
    <h1 id="firstH1">첫 번째 제목</h1>
</body>
</html>
