<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM(document object model)</title>
    <script>
        window.onload = function(){
            let firstH1 =document.getElementById("first_h1");
            firstH1.style.color = "orange";
            firstH1.style.backgroundColor = "red";
            firstH1.innerHTML = "첫 번째 h1 요소입니다.";
        }
    </script>
</head>
<body>
    <h1 id="first_h1">DOM(document object model)</h1>
    <h1>: 요소객체가 로드된 이후에 요소객체의 CSS 스타일을 변경할 수 있습니다.</h1>
</body>
</html>
