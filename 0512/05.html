<head>

        .top_bar{

            height: 50px;

            margin-left: 50px;
            padding: 20px;
        }

    <div class="top_bar">
    </div>
    <div class="left_bar">
    </div>
    <div class="content">
        <p>This is the main content area of the page.</p>
    </div>

</html>
